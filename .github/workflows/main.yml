name: CI/CD Pipeline for LLM Analyzer

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Build & Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.10

      - name: Install Dependencies
        run: uv sync --all-groups

      - name: Run Unit Tests (Pytest)
        run: uv run pytest test_main.py -v

  benchmark:
    name: Adversarial Benchmark (F1 ≥ 0.85)
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Dependencies
        run: uv sync --all-groups

      - name: Run Benchmark
        run: uv run python benchmark/run.py

      - name: Upload Benchmark Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-report
          path: benchmark/report.json

  deploy:
    name: Deploy to Render
    needs: [build-and-test, benchmark]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger Render Deployment
        env:
          DEPLOY_URL_RAW: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          # ตัด whitespace / newline ที่อาจปนมาตอน paste
          DEPLOY_URL="$(echo -n "$DEPLOY_URL_RAW" | tr -d '[:space:]')"

          if [ -z "$DEPLOY_URL" ]; then
            echo "❌ RENDER_DEPLOY_HOOK_URL secret is empty"
            echo "   → ไปที่ Settings → Secrets and variables → Actions"
            echo "   → ตั้งชื่อ RENDER_DEPLOY_HOOK_URL พร้อม URL จาก Render"
            exit 1
          fi

          # ตรวจ URL pattern ของ Render hook
          case "$DEPLOY_URL" in
            https://api.render.com/deploy/srv-*)
              echo "✅ Hook URL format ok"
              ;;
            *)
              echo "❌ URL format invalid (must start with https://api.render.com/deploy/srv-)"
              echo "   first 35 chars: ${DEPLOY_URL:0:35}"
              exit 1
              ;;
          esac

          echo "📡 Triggering Render deploy hook..."
          response=$(curl -fsS -X POST "$DEPLOY_URL")
          echo "Response: $response"
          echo "✅ Deploy triggered — check https://dashboard.render.com for build progress"
